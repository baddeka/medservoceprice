<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedServicePrice.kz — сравнение цен на медуслуги в Казахстане</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="bg-float" aria-hidden="true">
      <span class="blob b1"></span>
      <span class="blob b2"></span>
      <span class="blob b3"></span>
      <span class="blob b4"></span>
      <span class="gly g1">✚</span>
      <span class="gly g2">🧬</span>
      <span class="gly g3">💊</span>
      <span class="gly g4">🩺</span>
    </div>
    <div class="wrap">
      <nav class="topbar">
        <div class="brand">
          <svg class="logo" viewBox="0 0 44 44" role="img" aria-label="MedServicePrice логотип">
            <defs>
              <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#22d3c5"/><stop offset="1" stop-color="#3b82f6"/>
              </linearGradient>
            </defs>
            <rect width="44" height="44" rx="13" fill="url(#logoG)"/>
            <rect width="44" height="19" rx="13" fill="#ffffff" opacity="0.16"/>
            <path d="M18.3 10h7.4v7.9h7.9v7.4h-7.9V33h-7.4v-7.7H10.4v-7.4h7.9z" fill="#fff"/>
          </svg>
          <div class="brand-txt">
            <span class="brand-name">MedServicePrice<span class="dot">.kz</span></span>
            <span class="brand-sub">сравнение цен на медицинские услуги</span>
          </div>
        </div>
      </nav>

      <div class="hero">
        <h1>Найдите, где дешевле сдать анализ или попасть к врачу</h1>

        <div class="searchbar">
          <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
          <input id="q" type="text" autocomplete="off"
                 placeholder="Анализ, услуга или врач — например «общий анализ крови»" />
          <button id="searchBtn">Найти</button>
          <div class="ac" id="ac"></div>
        </div>

        <div class="chips" id="chips"></div>
      </div>
    </div>
  </header>

  <main>
    <aside class="filters">
      <div class="filters-card">
        <h3>Фильтры</h3>
        <div class="field">
          <label>Город</label>
          <select id="f-city"><option value="">Все города</option></select>
        </div>
        <div class="field">
          <label>Цена, ₸</label>
          <div class="price-row">
            <input id="f-pmin" type="number" min="0" placeholder="от" />
            <input id="f-pmax" type="number" min="0" placeholder="до" />
          </div>
        </div>
        <div class="field">
          <label>Сортировка</label>
          <select id="f-sort">
            <option value="price_asc">Сначала дешевле</option>
            <option value="price_desc">Сначала дороже</option>
            <option value="popular">Больше клиник</option>
            <option value="name">По названию</option>
          </select>
        </div>
        <label class="checkbox">
          <input type="checkbox" id="f-stale" /> Показывать устаревшие (&gt;30 дней)
        </label>
        <button class="btn-reset" id="resetBtn">Сбросить</button>
      </div>

      <div class="filters-card admin">
        <button class="btn-admin" id="parseBtn">↻ Обновить актуальность данных</button>
        <div class="admin-msg" id="adminMsg">Проверяет источники и подтягивает свежие цены.</div>
      </div>
    </aside>

    <section class="results-area">
      <div class="results-head">
        <h2 id="resultsTitle">Популярные услуги</h2>
        <span class="count" id="count"></span>
      </div>
      <div id="results"></div>
    </section>
  </main>

  <div class="modal-back" id="modalBack">
    <div class="modal" id="modal"></div>
  </div>

  <footer>
    <div class="wrap">
      MedServicePrice.kz · агрегатор публичных цен · у каждой цены указана дата обновления · Хакатон 2025
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
